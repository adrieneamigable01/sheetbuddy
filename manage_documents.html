<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/config.js"></script>



    <link rel="stylesheet" href="assets/css/manage_documents.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <!-- Header Section -->
   <div class="d-flex justify-content-between align-items-center mb-5 p-4 bg-white rounded-4 shadow-sm border border-light">
        <div class="d-flex align-items-start align-items-md-center">
            <!-- BACK BUTTON -->
            <button class="btn btn-link link-secondary text-decoration-none p-0 me-3 mt-1 mt-md-0" onclick="goBackToDashboard()" title="Go Back">
                <i class="bi bi-arrow-left-short fs-1 lh-1"></i>
            </button>

            <div>
                <div class="d-flex align-items-center mb-1">
                    <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-3">
                        <i class="bi bi-folder2-open text-primary fs-3"></i>
                    </div>
                    <h2 class="fw-bold mb-0 text-dark">Manage Folders</h2>
                </div>
                <p class="text-muted mb-0 ms-5 ps-2 d-none d-md-block">
                    Organize your workspace by dragging documents into custom folders.
                </p>
            </div>
        </div>
        
        <div class="d-flex gap-2 align-self-start align-self-md-center mt-2 mt-md-0">
            <button class="btn btn-outline-primary border-2 px-4 fw-semibold rounded-3" onclick="createNewFolder()">
                <i class="bi bi-folder-plus me-2"></i>New Folder
            </button>
            <button class="btn btn-primary px-4 fw-semibold shadow-sm rounded-3 hover-lift" onclick="addCustomSheet()">
                <i class="bi bi-link-45deg fs-5 me-1"></i>Link My Sheet
            </button>
        </div>
    </div>

    <div class="row">
        <!-- FOLDERS COLUMN -->
        <div class="col-md-8">
            <h5 class="text-muted mb-3 small fw-bold text-uppercase">Your Folders</h5>
            <div id="folderList"></div>
        </div>

        <!-- UNGROUPED DOCS COLUMN -->
        <div class="col-md-4">
            <h5 class="text-muted mb-3 small fw-bold text-uppercase">Admin Documents</h5>
            <div id="adminUngroupedList" class="drag-area mb-4" data-source="admin"></div>

            <h5 class="text-muted mb-3 small fw-bold text-uppercase">My Custom Documents</h5>
            <div id="userUngroupedList" class="drag-area" data-source="user"></div>
        </div>
    </div>
    
    <div class="mt-5 border-top pt-4 d-flex align-items-center justify-content-between">
        <a href="index.php" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
        </a>
        <button class="btn btn-success px-5 fw-bold shadow" onclick="saveChanges()">
            <i class="bi bi-check-lg me-2"></i>Save Arrangement
        </button>
    </div>
</div>

<!-- Modal for Linking Sheets -->
<div class="modal fade" id="docModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form id="docForm" class="modal-content shadow-lg border-0">
            <input type="hidden" name="id" id="doc_id">
            <input type="hidden" name="email" id="formUserEmail">
            
            <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Link Personal Sheet</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Document Name</label>
                    <input type="text" id="name" class="form-control form-control-lg shadow-sm" placeholder="e.g. My Expense Tracker" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase text-muted">Google Sheet ID</label>
                    <div class="input-group shadow-sm">
                        <input type="text" id="sheet_id" class="form-control" placeholder="Select a file..." required>
                        <button class="btn btn-dark" type="button" onclick="openPicker()">
                            <i class="bi bi-search me-1"></i> Browse
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary px-4 fw-bold">Save Document</button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/manage_docs.js"></script>
<!-- Google API Scripts -->
<script async defer src="https://apis.google.com/js/api.js" onload="onGapiLoad()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="onGisLoad()"></script>
</body>
</html>
