<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Management | Admin</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #0aa5a5;
            --primary-hover: #088a8a;
            --bg-subtle: #f4f7f9;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body { 
            background-color: var(--bg-subtle); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #2d3436;
        }

        /* Modern Navbar */
        .navbar { 
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1a1a1a;
        }

        /* Card & Table Styling */
        .card { 
            border: none; 
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            background: #ffffff;
            overflow: hidden;
        }

        .table thead th {
            background-color: #fcfcfc;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            font-weight: 700;
            color: #95a5a6;
            padding: 1.25rem;
            border-bottom: 1px solid #f1f1f1;
        }

        .table tbody td {
            padding: 1.25rem;
            vertical-align: middle;
            border-bottom: 1px solid #f8f9fa;
        }

        .sheet-id-text { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.8rem; 
            background: #f1f3f5;
            padding: 4px 8px;
            border-radius: 6px;
            color: #495057;
        }

        /* Buttons */
        .btn {
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary { 
            background-color: var(--primary-color); 
            border: none;
            box-shadow: 0 4px 12px rgba(10, 165, 165, 0.2);
        }

        .btn-primary:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(10, 165, 165, 0.3);
        }

        .btn-action {
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        /* Modal Customization */
        .modal-content {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .modal-header { border-bottom: 1px solid #f1f1f1; padding: 1.5rem; }
        .modal-footer { border-top: none; padding: 1.5rem; }

        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid #e0e0e0;
            background-color: #fdfdfd;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(10, 165, 165, 0.1);
        }

        /* Google Picker Z-Index Fix */
        .picker-dialog { z-index: 2000 !important; }
        .picker-dialog-bg { z-index: 1999 !important; }

        /* DataTables Customization */
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            color: white !important;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<nav class="navbar sticky-top mb-5">
    <div class="container">
        <span class="navbar-brand d-flex align-items-center">
            <div class="bg-primary bg-opacity-10 p-2 rounded-3 me-2">
                <i class="bi bi-grid-1x2-fill text-primary"></i>
            </div>
            SheetManager
        </span>
        <button class="btn btn-primary" onclick="prepareAdd()">
            <i class="bi bi-plus-lg me-2"></i> Add Document
        </button>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card p-2">
                <div class="card-body">
                    <table id="docsTable" class="table w-100">
                        <thead>
                            <tr>
                                <th>Display Name</th>
                                <th>Google Sheet ID</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="docModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="docForm">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">New Document</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="doc_id" name="id">
                    
                    <div class="mb-4">
                        <label class="form-label fw-600 small text-muted text-uppercase">Source File</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-google text-danger"></i></span>
                            <input type="text" class="form-control border-start-0" id="sheet_id" name="sheet_id" placeholder="Select from Drive..." required readonly>
                            <button class="btn btn-dark ms-2" type="button" onclick="openPicker()">
                                Browse
                            </button>
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-600 small text-muted text-uppercase">Label Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="How it appears on dashboard" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link text-muted text-decoration-none" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-5">Save Document</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS Dependencies -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Google API Scripts -->
<script async defer src="https://apis.google.com/js/api.js" onload="onGapiLoad()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="onGisLoad()"></script>

<!-- Keep your existing config.js and manage_docs.js links -->
<script src="assets/js/config.js"></script>
<script src="assets/js/manage_sheets.js"></script>

</body>
</html>
