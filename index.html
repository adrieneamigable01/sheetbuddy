<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sheets Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="login-card">
    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
        <i class="bi bi-shield-lock text-primary fs-3"></i>
    </div>
    <h3 class="fw-bold mb-2">Welcome Back</h3>
    <p class="text-muted mb-4">Please sign in with your Google account to access your reports.</p>
    
    <button class="btn btn-teal w-100" onclick="login()">
        <i class="bi bi-google me-2"></i> Sign in with Google
    </button>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/index.js"></script>

</body>
</html>
